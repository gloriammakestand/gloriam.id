<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gloriam Store</title>
<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}
header {background:black; color:white; padding:20px; text-align:center;}
.section {padding:20px;}
.products {display:grid; grid-template-columns:repeat(2,1fr); gap:15px;}
.card {background:white; padding:10px; text-align:center; border-radius:10px;}
.card img {width:100%; border-radius:10px;}
button {background:black; color:white; padding:10px; border:none; margin-top:10px; width:100%;}
.modal {display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);}
.modal-content {background:white; margin:10% auto; padding:20px; width:90%; border-radius:10px;}
input, select {width:100%; padding:10px; margin:5px 0;}
</style>
</head>
<body><header>
<h1>PRE ORDER</h1>
<p>SOCCER ADDICT</p>
<p>Harga: Rp110.000 (DP 60.000)</p>
</header><div class="section">
<h2>Ready Stock</h2>
<div class="products"><div class="card">
<img src="https://via.placeholder.com/300">
<h3>Bless Home</h3>
<p>Rp80.000</p>
<button onclick="openProduct('Bless Home',80000)">Pilih</button>
</div><div class="card">
<img src="https://via.placeholder.com/300">
<h3>Sleman Soccer</h3>
<p>Rp90.000</p>
<button onclick="openProduct('Sleman Soccer',90000)">Pilih</button>
</div></div>
</div><!-- Modal Produk --><div class="modal" id="productModal">
<div class="modal-content">
<h3 id="productName"></h3>
<p id="productPrice"></p><label>Size</label> <select id="size">

<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
<option>XXL</option>
</select><button onclick="openCheckout()">Checkout</button>

</div>
</div><!-- Modal Checkout --><div class="modal" id="checkoutModal">
<div class="modal-content">
<h3>Checkout</h3>
<input id="name" placeholder="Nama">
<input id="phone" placeholder="No HP">
<input id="address" placeholder="Alamat">
<button onclick="sendWA()">Kirim ke WhatsApp</button>
</div>
</div><script>
let selectedProduct = '';
let selectedPrice = 0;

function openProduct(name, price){
selectedProduct = name;
selectedPrice = price;
document.getElementById('productName').innerText = name;
document.getElementById('productPrice').innerText = 'Rp'+price;
document.getElementById('productModal').style.display='block';
}

function openCheckout(){
document.getElementById('productModal').style.display='none';
document.getElementById('checkoutModal').style.display='block';
}

function sendWA(){
let name = document.getElementById('name').value;
let phone = document.getElementById('phone').value;
let address = document.getElementById('address').value;
let size = document.getElementById('size').value;

let message = `Halo, saya ingin order:%0AProduk: ${selectedProduct}%0ASize: ${size}%0AHarga: Rp${selectedPrice}%0ANama: ${name}%0AHP: ${phone}%0AAlamat: ${address}`;

window.location.href = `https://wa.me/62XXXXXXXXXX?text=${message}`;
}

window.onclick = function(e){
if(e.target.classList.contains('modal')){
e.target.style.display='none';
}
}
</script></body>
</html>
